services:

  # ─────────────────────────────────────────
  # Base de données PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: yobante_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-yobante}
      POSTGRES_USER: ${DB_USER:-yobante}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yobantepassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-yobante} -d ${DB_NAME:-yobante}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Backend Node.js
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yobante_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000

      # Base de données — pointe vers le service postgres ci-dessus
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-yobante}
      DB_USER: ${DB_USER:-yobante}
      DB_PASSWORD: ${DB_PASSWORD:-yobantepassword}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_RESET_SECRET: ${JWT_RESET_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-*}

      # Admin par défaut (seeder)
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NOM: ${ADMIN_NOM}
      ADMIN_PRENOM: ${ADMIN_PRENOM}

      # Email (Resend)
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_FROM: ${MAIL_FROM}

      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
