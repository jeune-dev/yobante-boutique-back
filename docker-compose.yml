services:

  # ─────────────────────────────────────────
  # Base de données PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: yobante_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-yobante}
      POSTGRES_USER: ${DB_USER:-yobante}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yobantepassword}
    command: >
      postgres
      -c max_locks_per_transaction=256
      -c max_pred_locks_per_transaction=256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-yobante} -d ${DB_NAME:-yobante}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────
  # Backend Node.js
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: yobante_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      # Pas de CORS_ORIGIN=* — doit être défini dans .env avec une origine explicite
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
